<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Security Dashboard</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-bar {
            background-color: #00ff7f; /* Spring Green */
            color: #000;
            padding: 10px 20px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sub-bar {
            background-color: #00ff7f;
            height: 20px;
            margin-bottom: 30px;
        }
        .container {
            background-color: #2b2b2b;
            padding: 20px;
            border-radius: 5px;
            max-width: 800px;
            margin: auto;
        }
        h3 {
            color: #00ff7f;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="text"], input[type="date"], input[type="time"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 3px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            background-color: #00ff7f;
            color: #000;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background-color: #00cc66;
        }
        /* Table styling for the retrieved data */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #333;
        }
        th, td {
            border: 1px solid #555;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #00ff7f;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header-bar">🏠 Smart Home</div>
    <div class="sub-bar"></div>

    <div class="container">
        <h3>📊 Data Retrieval</h3>
        
        <form id="dataForm">
            <div class="form-group">
                <label for="room">Which room?</label>
                <input type="text" id="room" placeholder="Bedroom" required>
            </div>
            
            <div class="form-group">
                <label for="date">Enter date:</label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label for="time">Enter start time:</label>
                <input type="time" id="time" required>
            </div>
            
            <button type="submit">OK</button>
        </form>

        <div id="resultsContainer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
